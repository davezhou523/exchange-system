syntax = "proto3";

package strategy;

option go_package = "exchange-system/common/pb/strategy";



// 交易信号 — execution 只消费此消息，不消费原始K线
//
// 数据流：Market(Kline) → Strategy(分析+决策) → Signal → Execution(下单+风控)
//
// Signal 包含"可执行"信息：方向、数量、止损止盈、信号类型
// 不包含：原始K线数据、中间指标计算过程
message SignalReason {
  string summary = 1;           // 兼容旧链路的摘要描述
  string phase = 2;             // OPEN_ENTRY / CLOSE_EXIT
  string trend_context = 3;     // 大级别趋势背景
  string setup_context = 4;     // 入场/出场触发背景
  string path_context = 5;      // 收割路径或盘口路径背景
  string execution_context = 6; // 止损止盈、仓位、确认条件等执行信息
  repeated string tags = 7;     // 标签，如 ["15m", "trend_following", "long"]
  string route_bucket = 8;      // 上游路由器产出的统一策略桶
  string route_reason = 9;      // 上游路由器产出的统一路由原因
  string route_template = 10;   // 上游路由器最终选中的模板
  PositionAllocatorStatus allocator = 11; // 发出信号时对应的 allocator 快照
  RangeSignalReason range = 12; // 震荡策略的结构化判定摘要，便于前端直接展示
  string exit_reason_kind = 13; // 结构化出场原因分类，如 partial_take_profit / break_even_stop / rsi_take_profit
  string exit_reason_label = 14; // 出场原因中文标签，如 分批止盈 / 保本止损 / RSI止盈
}

message RangeSignalReason {
  bool h1_range_ok = 1;         // 1H 是否满足震荡前提
  bool h1_adx_ok = 2;           // 1H ADX 是否低于阈值
  bool h1_boll_width_ok = 3;    // 1H Boll 带宽是否足够收窄
  bool m15_touch_lower = 4;     // 15M 是否触及下轨
  bool m15_rsi_turn_up = 5;     // 15M RSI 是否拐头向上
  bool m15_touch_upper = 6;     // 15M 是否触及上轨
  bool m15_rsi_turn_down = 7;   // 15M RSI 是否拐头向下
}

message Signal {
  string strategy_id = 1;     // 策略ID，如 "trend-following-BTCUSDT"
  string symbol = 2;          // 交易对，如 "BTCUSDT"
  string action = 3;          // 动作：BUY, SELL, HOLD
  string side = 4;            // 仓位方向：LONG, SHORT
  double quantity = 5;        // 下单数量
  double entry_price = 6;     // 入场/出场价格
  double stop_loss = 7;       // 止损价
  repeated double take_profits = 8; // 止盈价列表
  string reason = 9;          // 兼容旧链路的摘要原因
  int64 timestamp = 10;       // 信号时间戳（毫秒）

  // --- 以下为新增字段 ---

  string signal_type = 11;    // 信号类型：OPEN=开仓, CLOSE=平仓, HOLD=持仓观察
  string interval = 12;       // 信号周期，如 "15m"
  double atr = 13;            // 当前ATR（execution用于计算滑点容忍度）
  double risk_reward = 14;    // 风险收益比（如 2.0 表示盈亏比 1:2）

  // 指标快照 — 供日志/审计用，execution 不做计算
  map<string, double> indicators = 15; // 如 {"h4_ema21":68000, "m15_rsi":62.3, "m15_atr":350}
  SignalReason signal_reason = 16;     // 结构化原因描述
}

// 策略配置
message StrategyConfig {
  string symbol = 1;
  string name = 2;
  map<string, double> parameters = 3;
  bool enabled = 4;
}

// 策略状态
message PositionAllocatorStatus {
  string template = 1;          // 当前 symbol 最终使用的策略模板
  string route_bucket = 2;      // 当前 symbol 对应的统一策略桶
  string route_reason = 3;      // 当前 symbol 对应的统一路由原因
  double score = 4;             // 当前 symbol 预算分配使用的最终 score
  string score_source = 5;      // score 的来源，如 symbol_score / regime_analysis
  double bucket_budget = 6;     // 当前策略桶的总预算
  double strategy_weight = 7;   // 当前策略桶在本轮 allocator 中的配比
  double symbol_weight = 8;     // 当前 symbol 在桶内的配比
  double risk_scale = 9;        // 当前全局风险缩放系数
  double position_budget = 10;  // 当前 symbol 的最终仓位预算
  bool trading_paused = 11;     // 当前轮是否被 allocator 暂停交易
  string pause_reason = 12;     // allocator 暂停原因
  string route_reason_desc = 13; // route_reason 的中文说明，供前端直接展示
  string pause_reason_desc = 14; // pause_reason 的中文说明，供前端直接展示
}

message RegimeFrameStatus {
  string interval = 1;          // 周期，如 1h / 15m
  string state = 2;             // 该周期当前识别出的状态
  string reason = 3;            // 该周期 marketstate 原始原因
  string route_reason = 4;      // 该周期映射后的统一路由原因
  double confidence = 5;        // 该周期判态置信度
  int64 last_update = 6;        // 该周期最近一次更新时间
  bool healthy = 7;             // 该周期特征是否健康
  bool fresh = 8;               // 该周期特征是否在 freshness window 内
  string reason_desc = 9;       // reason 的中文说明，供前端直接展示
  string route_reason_desc = 10; // route_reason 的中文说明，供前端直接展示
}

message RegimeFusionStatus {
  RegimeFrameStatus h1 = 1;     // 1H 主状态
  RegimeFrameStatus m15 = 2;    // 15M 辅助状态
  string fused_state = 3;       // 加权融合后的最终状态
  string fused_reason = 4;      // 融合原因，如 timeframes_aligned / h1_primary_dominant
  double fused_score = 5;       // 融合得分
  double primary_weight = 6;    // 主状态权重，当前默认 0.7
  double confirm_weight = 7;    // 辅助状态权重，当前默认 0.3
  int64 last_update = 8;        // 融合结果更新时间
  string fused_reason_desc = 9; // fused_reason 的中文说明，供前端直接展示
}

message StrategyWarmupStatus {
  int32 history_len_4h = 1;     // 当前 4H 历史缓存长度
  int32 history_len_1h = 2;     // 当前 1H 历史缓存长度
  int32 history_len_15m = 3;    // 当前 15M 历史缓存长度
  int32 history_len_1m = 4;     // 当前 1M 历史缓存长度
  string source = 5;            // 长度来源：runtime / cache / empty
  string status = 6;            // warmup_complete / warmup_incomplete，直接表示当前恢复是否完整
  repeated string incomplete_reasons = 7; // 当恢复不完整时列出缺项，如 insufficient_1h_history
}

message LatestSecondBarStatus {
  int64 open_time_ms = 1;  // 最近一条秒级行情的起始毫秒时间
  int64 close_time_ms = 2; // 最近一条秒级行情的结束毫秒时间
  double open = 3;         // 最近一条秒级行情开盘价
  double high = 4;         // 最近一条秒级行情最高价
  double low = 5;          // 最近一条秒级行情最低价
  double close = 6;        // 最近一条秒级行情收盘价
  double volume = 7;       // 最近一条秒级行情累计成交量
  bool is_final = 8;       // 最近一条秒级行情是否已封口
  bool synthetic = 9;      // 是否来自盘口兜底而非真实成交
  string source = 10;      // trade / depth_fallback
}

message StrategyRouteRuntimeStatus {
  bool enabled = 1;             // Universe 当前轮目标是否允许启用该策略
  string template = 2;          // Universe 当前轮目标模板
  string route_bucket = 3;      // Universe 当前轮目标策略桶
  string target_reason = 4;     // Universe 当前轮目标原因，可能来自路由、健康门禁或保护规则
  string base_template = 5;     // Universe 当前轮路由前的基础模板
  bool runtime_enabled = 6;     // Universe 应用后当前实际是否保持启用
  string runtime_template = 7;  // Universe 应用后当前实际模板
  string apply_action = 8;      // 当前轮 Universe 对该 symbol 执行的动作
  string apply_gate_reason = 9; // 当前实际状态与目标态不一致时的运行时门禁原因
  bool has_strategy = 10;       // 当前运行时是否存在策略实例
  bool has_open_position = 11;  // 当前是否仍持有未平仓位
  RegimeFusionStatus regime_fusion = 12; // Universe 最近一轮 1H/15M 多周期融合判态
  StrategyWarmupStatus warmup = 13; // 当前实例或缓存中的多周期历史长度，便于判断冷启动恢复是否完整
  string target_reason_desc = 14; // target_reason 的中文说明，供前端直接展示
  string apply_gate_reason_desc = 15; // apply_gate_reason 的中文说明，供前端直接展示
  string apply_action_desc = 16; // apply_action 的中文说明，供前端直接展示
  LatestSecondBarStatus latest_second_bar = 17; // 最近一条 1s 输入行情，便于确认 synthetic fallback 是否生效
}

message StrategyStatus {
  string strategy_id = 1;
  string status = 2; // RUNNING, STOPPED, ERROR
  string message = 3; // 人类可读短消息，避免承载需要机器解析的长串
  int64 last_update = 4;
  PositionAllocatorStatus allocator = 5; // 结构化 allocator 视角，便于外部直接消费
  StrategyRouteRuntimeStatus router = 6; // Universe 当前轮路由与运行时目标视角
  string status_desc = 7; // status 的中文说明，供前端直接展示
  string message_code = 8; // message 的稳定英文码，供前端直接判断
  string message_desc = 9; // message_code 的中文说明，供前端直接展示
}

service StrategyService {
  // 启动策略
  rpc StartStrategy(StrategyConfig) returns (StrategyStatus) {}
  // 停止策略
  rpc StopStrategy(StrategyRequest) returns (StrategyStatus) {}
  // 获取策略状态
  rpc GetStrategyStatus(StrategyRequest) returns (StrategyStatus) {}
  // 获取策略信号流
  rpc StreamSignals(StrategyRequest) returns (stream Signal) {}
}

message StrategyRequest {
  string strategy_id = 1;
}