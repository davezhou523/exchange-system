syntax = "proto3";

package strategy;

option go_package = "exchange-system/common/pb/strategy";



// 交易信号 — execution 只消费此消息，不消费原始K线
//
// 数据流：Market(Kline) → Strategy(分析+决策) → Signal → Execution(下单+风控)
//
// Signal 包含"可执行"信息：方向、数量、止损止盈、信号类型
// 不包含：原始K线数据、中间指标计算过程
message SignalReason {
  string summary = 1;           // 兼容旧链路的摘要描述
  string phase = 2;             // OPEN_ENTRY / CLOSE_EXIT
  string trend_context = 3;     // 大级别趋势背景
  string setup_context = 4;     // 入场/出场触发背景
  string path_context = 5;      // 收割路径或盘口路径背景
  string execution_context = 6; // 止损止盈、仓位、确认条件等执行信息
  repeated string tags = 7;     // 标签，如 ["15m", "trend_following", "long"]
}

message Signal {
  string strategy_id = 1;     // 策略ID，如 "trend-following-BTCUSDT"
  string symbol = 2;          // 交易对，如 "BTCUSDT"
  string action = 3;          // 动作：BUY, SELL, HOLD
  string side = 4;            // 仓位方向：LONG, SHORT
  double quantity = 5;        // 下单数量
  double entry_price = 6;     // 入场/出场价格
  double stop_loss = 7;       // 止损价
  repeated double take_profits = 8; // 止盈价列表
  string reason = 9;          // 兼容旧链路的摘要原因
  int64 timestamp = 10;       // 信号时间戳（毫秒）

  // --- 以下为新增字段 ---

  string signal_type = 11;    // 信号类型：OPEN=开仓, CLOSE=平仓, HOLD=持仓观察
  string interval = 12;       // 信号周期，如 "15m"
  double atr = 13;            // 当前ATR（execution用于计算滑点容忍度）
  double risk_reward = 14;    // 风险收益比（如 2.0 表示盈亏比 1:2）

  // 指标快照 — 供日志/审计用，execution 不做计算
  map<string, double> indicators = 15; // 如 {"h4_ema21":68000, "m15_rsi":62.3, "m15_atr":350}
  SignalReason signal_reason = 16;     // 结构化原因描述
}

// 策略配置
message StrategyConfig {
  string symbol = 1;
  string name = 2;
  map<string, double> parameters = 3;
  bool enabled = 4;
}

// 策略状态
message StrategyStatus {
  string strategy_id = 1;
  string status = 2; // RUNNING, STOPPED, ERROR
  string message = 3;
  int64 last_update = 4;
}

service StrategyService {
  // 启动策略
  rpc StartStrategy(StrategyConfig) returns (StrategyStatus) {}
  // 停止策略
  rpc StopStrategy(StrategyRequest) returns (StrategyStatus) {}
  // 获取策略状态
  rpc GetStrategyStatus(StrategyRequest) returns (StrategyStatus) {}
  // 获取策略信号流
  rpc StreamSignals(StrategyRequest) returns (stream Signal) {}
}

message StrategyRequest {
  string strategy_id = 1;
}