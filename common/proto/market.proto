syntax = "proto3";

package market;

option go_package = "exchange-system/common/pb/market";



// K线数据类型
message Kline {
  string symbol = 1;            // 交易对，如 ETHUSDT
  string interval = 2;          // K线周期，如 1m/15m/1h/4h
  int64 open_time = 3;          // 周期开始时间(ms, UTC)
  double open = 4;              // 开盘价
  double high = 5;              // 最高价
  double low = 6;               // 最低价
  double close = 7;             // 收盘价
  double volume = 8;            // 成交量（基础币数量）
  int64 close_time = 9;         // 周期结束时间(ms, UTC)
  bool is_closed = 10;          // 周期是否已收盘
  int64 event_time = 11;        // market 服务生成该消息的事件时间(ms)
  int64 first_trade_id = 12;    // 聚合区间内第一笔成交 ID
  int64 last_trade_id = 13;     // 聚合区间内最后一笔成交 ID
  int32 num_trades = 14;        // 聚合区间内成交笔数
  double quote_volume = 15;     // 成交额（报价币，如 USDT）
  double taker_buy_volume = 16; // 主动买入成交量
  double taker_buy_quote = 17;  // 主动买入成交额
  bool is_dirty = 18;           // 数据不完整标记（缺口/迟到数据/聚合不完整），true 表示后续可能被修正
  bool is_tradable = 19;        // 策略是否可交易；当前通常等价于 !is_dirty
  bool is_final = 20;           // 是否为最终确认版；true 表示该条已通过 watermark/完整性确认
                               // EmitWatermark 模式：收盘后等 watermark，再发最终版本
                               // EmitImmediate 模式：bucket 一完成就先发，dirty 时后续可能被修正
  string dirty_reason = 21;     // 上游聚合器给出的 dirty 原因，如 incomplete_bucket / continuity_gap

  // 技术指标（由Aggregator增量计算，避免策略重复计算）
  double ema21 = 24;            // EMA21（快线）
  double ema55 = 25;            // EMA55（慢线）
  double rsi = 26;              // RSI14
  double atr = 27;              // ATR14
}

// 深度数据
message Depth {
  string symbol = 1;
  int64 timestamp = 2;
  repeated DepthItem bids = 3;
  repeated DepthItem asks = 4;
}

message DepthItem {
  double price = 1;
  double quantity = 2;
}

// 交易数据
message Trade {
  string symbol = 1;
  int64 trade_id = 2;
  double price = 3;
  double quantity = 4;
  int64 timestamp = 5;
  bool is_buyer_maker = 6;
}

// 市场数据流消息
message MarketData {
  string type = 1; // "kline", "depth", "trade"
  string symbol = 2;
  oneof data {
    Kline kline = 3;
    Depth depth = 4;
    Trade trade = 5;
  }
}

service MarketService {
  // 订阅市场数据流
  rpc StreamMarketData(StreamRequest) returns (stream MarketData) {}
}

message StreamRequest {
  repeated string symbols = 1;
  repeated string types = 2; // kline, depth, trade
}