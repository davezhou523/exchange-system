syntax = "proto3";

package market;

option go_package = "exchange-system/common/pb/market";



// K线数据类型
message Kline {
  string symbol = 1;
  string interval = 2;
  int64 open_time = 3;
  double open = 4;
  double high = 5;
  double low = 6;
  double close = 7;
  double volume = 8;
  int64 close_time = 9;
  bool is_closed = 10;
  int64 event_time = 11;        // 事件时间(ms)
  int64 first_trade_id = 12;    // 第一笔成交ID
  int64 last_trade_id = 13;     // 末一笔成交ID
  int32 num_trades = 14;        // 成交笔数
  double quote_volume = 15;     // 成交额
  double taker_buy_volume = 16; // 主动买入成交量
  double taker_buy_quote = 17;  // 主动买入成交额
  bool is_dirty = 18;           // 数据不完整标记(有缺口/不完整)，数据层可发，策略层应禁止交易
  bool is_tradable = 19;        // 策略是否可交易(!is_dirty)，数据层设定，策略层直接判断
  bool is_final = 20;           // 信号确定性标记：数据已通过watermark确认，指标不会再变化，策略层可安全下单
                               // EmitWatermark模式：始终true（watermark保证数据完整性）
                               // EmitImmediate模式：!dirty（bucket完成即发，dirty则可能被迟到数据修正）

  // 技术指标（由Aggregator增量计算，避免策略重复计算）
  double ema21 = 24;            // EMA21（Binance 标准快线）
  double ema55 = 25;            // EMA55（Binance 标准慢线）
  double rsi = 26;              // RSI指标（RSI14）
  double atr = 27;              // ATR真实波动幅度（ATR14）
}

// 深度数据
message Depth {
  string symbol = 1;
  int64 timestamp = 2;
  repeated DepthItem bids = 3;
  repeated DepthItem asks = 4;
}

message DepthItem {
  double price = 1;
  double quantity = 2;
}

// 交易数据
message Trade {
  string symbol = 1;
  int64 trade_id = 2;
  double price = 3;
  double quantity = 4;
  int64 timestamp = 5;
  bool is_buyer_maker = 6;
}

// 市场数据流消息
message MarketData {
  string type = 1; // "kline", "depth", "trade"
  string symbol = 2;
  oneof data {
    Kline kline = 3;
    Depth depth = 4;
    Trade trade = 5;
  }
}

service MarketService {
  // 订阅市场数据流
  rpc StreamMarketData(StreamRequest) returns (stream MarketData) {}
}

message StreamRequest {
  repeated string symbols = 1;
  repeated string types = 2; // kline, depth, trade
}