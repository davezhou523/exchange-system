Name: strategy-rpc
ListenOn: 0.0.0.0:9081

Kafka:
  Addrs:
    - kafka1:19092
    - kafka2:29092
    - kafka3:39092
  Group: strategy-rpc-kline
  Topics:
    Kline: kline
    Signal: signal

# 多时间周期趋势跟踪策略（Strategy3）
# 架构：4H趋势判断 + 1H回调确认 + 15M入场信号
# ⚠️ 当前为调试参数，放宽了过滤条件以便快速触发信号验证流程
Strategies:
  - name: "trend-following"
    symbol: "ETHUSDT"
    enabled: true
    parameters:
      # === 风险控制 ===
      risk_per_trade: 0.03            # 单笔风险比例（3%）
      max_position_size: 0.55         # 最大仓位规模（55%）
      leverage: 7.0                   # 杠杆倍数
      max_leverage_ratio: 0.92        # 最大杠杆使用率（92%）
      equity: 10000                   # 账户权益（USD）

      # === 止损止盈 ===
      stop_loss_atr_multiplier: 1.5   # 止损距离 = ATR × 1.5
      ema_exit_buffer_atr: 0.30       # EMA破位缓冲带 = 0.3 × ATR

      # === 出场条件 ===
      min_holding_bars: 2             # 最小持仓K线数（调低：5→2，快速验证出场流程）
      ema_exit_confirm_bars: 1        # EMA破位确认K线数（调低：2→1）

      # === 回调判断 ===
      deep_pullback_scale: 0.9        # 深回调仓位缩放系数
      pullback_deep_band: 0.05        # 深回调判定带（放宽：0.003→0.05=5%）

      # === 信号过滤（全部放宽）===
      require_both_entry_signals: 0   # 入场信号模式（0=OR，更宽松）

      # 1H RSI过滤（大幅放宽范围）
      h1_rsi_long_low: 20            # 多头RSI下限（放宽：42→20）
      h1_rsi_long_high: 80           # 多头RSI上限（放宽：60→80）
      h1_rsi_short_low: 20           # 空头RSI下限（放宽：40→20）
      h1_rsi_short_high: 80          # 空头RSI上限（放宽：58→80）

      # 15M入场参数（放宽RSI偏置阈值）
      m15_breakout_lookback: 6        # 突破结构回顾期
      m15_rsi_bias_long: 40           # 多头RSI偏置阈值（放宽：52→40）
      m15_rsi_bias_short: 60          # 空头RSI偏置阈值（放宽：48→60）

      # === 调试参数（流程调通后删除）===
      debug_skip_4h_trend: 1          # 跳过4H趋势要求（0=不跳过, 1=根据价格与EMA关系推断方向）
      debug_skip_pullback: 1          # 跳过1H回调条件（0=不跳过, 1=跳过）
      debug_skip_15m_entry: 1         # 跳过15M入场信号（0=不跳过, 1=直接生成入场信号）

      # === 1m信号模式 ===
      signal_mode: 1                  # 信号模式（0=15m默认, 1=1m分钟周期）
      1m_atr_multiplier: 1.5          # 1m 止损ATR倍数
      1m_breakout_lookback: 20        # 1m 突破结构回顾期
      1m_rsi_bias_long: 55            # 1m 多头RSI偏置阈值
      1m_rsi_bias_short: 45           # 1m 空头RSI偏置阈值
      1m_min_holding_bars: 5          # 1m 最小持仓K线数
      1m_ema_exit_buffer_atr: 0.30    # 1m EMA破位缓冲ATR倍数

      # === 风险约束（放宽）===
      max_consecutive_losses: 10       # 最大连续亏损次数（放宽：3→10）
      max_daily_loss_pct: 0.50        # 最大日亏损比例（放宽：7%→50%）
      max_drawdown_pct: 0.80          # 最大回撤比例（放宽：15%→80%）
      drawdown_position_scale: 0.5    # 回撤仓位缩放系数
      max_positions: 1                 # 最大同时持仓数

Strategy:
  Symbol: ETHUSDT
  Name: strategy3
  RuntimeMode: kafka

KlineLogDir: data/kline
SignalLogDir: data/signal
