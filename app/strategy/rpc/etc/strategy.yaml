Name: strategy-rpc
ListenOn: 0.0.0.0:9081

Kafka:
  Addrs:
    - kafka1:19092
    - kafka2:29092
    - kafka3:39092
  Group: strategy-rpc-kline
  Topics:
    Kline: kline
    Signal: signal

Strategies:
  - name: "trend-following"
    symbol: "ETHUSDT"
    enabled: true
    parameters:
      ema_fast: 12
      ema_slow: 26
      rsi_period: 14
      rsi_overbought: 70
      rsi_oversold: 30

Strategy:
  Symbol: ETHUSDT
  Name: strategy3
  RuntimeMode: websocket