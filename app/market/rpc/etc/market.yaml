Name: market-rpc
ListenOn: 0.0.0.0:9080
Mode: dev
Kafka:
  Addrs:
    - kafka1:19092
    - kafka2:29092
    - kafka3:39092
  Topics:
    Kline: kline

KlineLogDir: data/kline

Binance:
  WebSocketURL: wss://fstream.binance.com
  Symbols:
    - ETHUSDT
  Intervals:
    - 1m
  Proxy: socks5://192.168.10.11:1080