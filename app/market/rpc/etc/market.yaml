Name: market-rpc
ListenOn: 0.0.0.0:9080
Mode: dev
Kafka:
  Addrs:
    - kafka1:19092
    - kafka2:29092
    - kafka3:39092
  Topics:
    Kline: kline

KlineLogDir: data/kline

# 水位线（watermark）：允许K线延迟到达的等待时间，类似 Flink/Spark Streaming
# 使用交易所时间(event time)计算，非系统时间(processing time)
WatermarkDelay: 2s

# watermark buffer 中 bucket 的最大存活时间，超时强制 flush（标记 dirty）
# 解决：长时间无新数据 / symbol 停止推送 → buffer 内存泄漏
MaxWatermarkBufferAge: 5m

# 指标默认参数（向后兼容，如果某周期未单独配置则使用此默认值）
Indicators:
  EmaFastPeriod: 12    # 快线EMA周期
  EmaSlowPeriod: 26    # 慢线EMA周期
  RsiPeriod: 14        # RSI周期
  AtrPeriod: 14        # ATR周期

# 指标计算模式，控制当前K线是否参与指标计算
# "closed"（默认）：当前K线参与计算，适合回测和收盘后下单
#   - 回测（用收盘价交易）：正确
#   - 实盘（收盘后下单）：正确
# "previous"：只用历史K线，适合实盘未收盘提前信号
#   - 实盘（未收盘提前信号）：更严格，无未来函数风险
IndicatorMode: closed

# K线发射模式，控制 bucket 完成后的发射时机
# "watermark"（默认）：watermark 确认后才发射，保证数据完整性
#   - Kafka 存储、数据归档、回测数据源
#   - 延迟 = WatermarkDelay，但数据完整性有保障
# "immediate"：bucket 完成后立即发射，低延迟
#   - 实盘交易信号、短周期策略（3m/5m）
#   - 延迟 = 0，但可能因迟到数据导致 dirty 重发
EmitMode: watermark

# 延迟容忍窗口（Flink watermark + lateness 模型）
# 超过 watermark + allowedLateness 的迟到数据将被丢弃，不参与聚合
# 例如：watermarkDelay=2s, allowedLateness=2m → 数据超过当前 watermark 2 分钟后丢弃
# 默认 0 表示不丢弃任何迟到数据
# AllowedLateness: 2m

# 每个周期独立配置指标参数（指标粒度与K线周期对齐）
# 核心原则：15m K线的 EMA/RSI/ATR 用 15m 收盘价序列计算，而非用 1m 数据
# 未配置的周期回退到 Indicators 默认值
IntervalIndicators:
  3m:
    EmaFastPeriod: 12
    EmaSlowPeriod: 26
    RsiPeriod: 14
    AtrPeriod: 14
  15m:
    EmaFastPeriod: 12
    EmaSlowPeriod: 26
    RsiPeriod: 14
    AtrPeriod: 14
  1h:
    EmaFastPeriod: 12
    EmaSlowPeriod: 26
    RsiPeriod: 14
    AtrPeriod: 14
  4h:
    EmaFastPeriod: 12
    EmaSlowPeriod: 26
    RsiPeriod: 14
    AtrPeriod: 14

Binance:
  WebSocketURL: wss://fstream.binance.com
  Symbols:
    - ETHUSDT
  Intervals:
    - 1m
  Proxy: socks5://192.168.10.11:1080
