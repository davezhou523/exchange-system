Name: market-rpc
ListenOn: 0.0.0.0:9080
Mode: dev
Log:
  Level: info
  Mode: file
Kafka:
  Addrs:
    - 127.0.0.1:9092
    - 127.0.0.1:29092
    - 127.0.0.1:39092
  Topics:
    Kline: kline
    Depth: ""

KlineLogDir: data/kline
WatermarkDelay: 1s
MaxWatermarkBufferAge: 5m
IndicatorMode: closed
EmitMode: watermark
WarmupPages: 3

Indicators:
  Ema21Period: 21
  Ema55Period: 55
  RsiPeriod: 14
  AtrPeriod: 14

WorkerGC:
  GCInterval: 5m
  MaxIdleTime: 30m

IntervalIndicators:
  1m: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  3m: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  5m: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  15m: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  1h: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  4h: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }

Binance:
  WebSocketURL: wss://fstream.binance.com
  Symbols:
    - ETHUSDT
    - BTCUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
  Intervals:
    - 1m
  Proxy: socks5://192.168.10.13:1080

UniversePool:
  Enabled: false
  LogDir: data/universepool
  CandidateSymbols:
    - ETHUSDT
    - BTCUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
  AllowList:
    - BTCUSDT
    - ETHUSDT
  BlockList: []
  EvaluateInterval: 30s
  MinActiveDuration: 1h
  MinInactiveDuration: 1h
  CooldownDuration: 1h
  AddScoreThreshold: 0.75
  RemoveScoreThreshold: 0.55
  Warmup:
    Enabled: true
    Min1mBars: 120
    Require15mReady: true
    Require1hReady: true
    Require4hReady: true
    RequireIndicatorsReady: true