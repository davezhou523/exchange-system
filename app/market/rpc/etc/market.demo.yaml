Name: market-rpc
ListenOn: 0.0.0.0:9080
Mode: dev
Log:
  Level: info
  Mode: file
Kafka:
  Addrs:
    - 127.0.0.1:9092
    - 127.0.0.1:29092
    - 127.0.0.1:39092
  Topics:
    Kline: kline
    Depth: ""

KlineLogDir: data/kline
WatermarkDelay: 1s
MaxWatermarkBufferAge: 5m
IndicatorMode: closed
EmitMode: watermark
WarmupPages: 3

Indicators:
  Ema21Period: 21
  Ema55Period: 55
  RsiPeriod: 14
  AtrPeriod: 14

WorkerGC:
  GCInterval: 5m
  MaxIdleTime: 30m

IntervalIndicators:
  1m: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  3m: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  5m: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  15m: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  1h: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }
  4h: { Ema21Period: 21, Ema55Period: 55, RsiPeriod: 14, AtrPeriod: 14 }

Binance:
  WebSocketURL: wss://fstream.binance.com
  Symbols:
    - ETHUSDT
    - BTCUSDT
    - BNBUSDT
    - SOLUSDT
    - DOGEUSDT
    - PEPEUSDT
  Intervals:
    - 1m
  Proxy: socks5://192.168.10.14:1080

ClickHouse:
  Enabled: true
  Endpoint: http://127.0.0.1:8123
  Database: exchange_analytics
  Username: default
  Password: ""
  Source: market-rpc
  Timeout: 3s
  QueueSize: 2048
  FlushInterval: 1s
  Recovery:
    Enabled: true
    QueryTimeout: 15s
    WarmupWaitTimeout: 2m
    PageLimit: 1500
    DeleteOverlap: true
    OverlapWindow: 3m

Postgres:
  Enabled: false
  DSN: "postgres://exchange:exchange@127.0.0.1:5432/exchange_core?sslmode=disable"
  AccountID: exchange-demo
  MaxOpenConns: 10
  MaxIdleConns: 5
  ConnMaxLifetime: 30m

UniversePool:
  Enabled: true
  LogDir: data/universepool
  CandidateSymbols:
    - ETHUSDT
    - BTCUSDT
    - BNBUSDT
    - SOLUSDT
    - DOGEUSDT
    - PEPEUSDT
  AllowList: []
  BlockList: []
  TrendPreferredSymbols:
    - ETHUSDT
    - SOLUSDT
    - BNBUSDT
  RangePreferredSymbols:
    - BTCUSDT
    - ETHUSDT
  BreakoutPreferredSymbols:
    - BTCUSDT
    - DOGEUSDT
    - PEPEUSDT
  BreakoutAtrPctMin: 0.0045
  BreakoutAtrPctExitMin: 0.0040
  EvaluateInterval: 30s
  MinActiveDuration: 1h
  MinInactiveDuration: 1h
  CooldownDuration: 1h
  AddScoreThreshold: 0.75
  RemoveScoreThreshold: 0.55
  Warmup:
    Enabled: true
    Min1mBars: 5
    Require15mReady: false
    Require1hReady: false
    Require4hReady: false
    RequireIndicatorsReady: true