Name: execution-rpc
ListenOn: 0.0.0.0:9082

Kafka:
  Addrs:
    - kafka1:19092
    - kafka2:29092
    - kafka3:39092
  Group: execution-rpc-signal
  Topics:
    Signal: signal
    Orders: order

Binance:
  BaseURL: https://demo-fapi.binance.com
  Testnet: true
  APIKey: "your-api-key"
  SecretKey: "your-secret-key"

Risk:
  MaxPositionSize: 0.55
  MaxLeverage: 7
  StopLossPercent: 0.02