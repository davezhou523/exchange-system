Name: execution-rpc
ListenOn: 0.0.0.0:9082
Log:
  Level: info
  Mode: file
  File: execution.log

Kafka:
  Addrs:
    - 127.0.0.1:9092
    - 127.0.0.1:29092
    - 127.0.0.1:39092
  Group: execution-rpc-signal
  Topics:
    Signal: signal
    HarvestPathSignal: harvest_path_signal
    Order: order
    Kline: kline

# 交易所路由配置
Exchange:
  # 路由策略: direct=指定交易所 | by_symbol=按交易对路由
  RouteStrategy: direct
  # 默认交易所: binance | okx
  DefaultExchange: binance

  # 按交易对路由映射（RouteStrategy=by_symbol 时生效）
  # SymbolRoutes:
  #   ETHUSDT: binance
  #   BTCUSDT: okx

  # 币安配置
  Binance:
    BaseURL: https://demo-fapi.binance.com
    Testnet: true
    APIKey: "EyYZXotRJaaXeycqfwLaDYBREyLTyNQK8lCuZKilieOg5gBgKGnpbdXBSMN7eMjJ"
    SecretKey: "69wfjz9tkqUykbwlla6HUYcCKuVtRKvOEYoCUC1BdA0dYChSOccJpI1xnUpId0UP"
    Proxy: socks5://192.168.10.14:1080

  # OKX 配置（暂未实现）
  # OKX:
  #   APIKey: ""
  #   SecretKey: ""
  #   Passphrase: ""
  #   BaseURL: https://www.okx.com

# 风控配置
Risk:
  MaxPositionSize: 0.2          # 单笔最大仓位占比 20%
  MaxLeverage: 7.0              # 最大杠杆 7 倍
  MaxDailyLossPct: 0.07         # 最大日亏损 7%
  MaxOpenPositions: 3           # 最大同时持仓数
  MaxPositionExposure: 2.0      # 总敞口 200%
  StopLossPercent: 0.02         # 止损 2%
  MinOrderNotional: 5.0         # 最小下单金额 5 USDT

# 主动降仓监控（回撤保护）
PositionMonitor:
  Enabled: false                # 默认关闭，需要时开启
  CheckInterval: 30s
  DrawdownThreshold: 0.15       # 回撤 15% 触发
  ReduceRatio: 0.5             # 触发后减半仓位
  MinReduceNotional: 10         # 最小降仓金额

# 幂等配置
Idempotent:
  TTLSeconds: 600               # 信号去重记录保留 10 分钟

# 日志目录（JSONL 格式，每行一条 JSON）
SignalLogDir: data/signal       # 收到的策略信号日志
OrderLogDir: data/order         # 订单执行结果日志

ClickHouse:
  Enabled: true
  Endpoint: http://127.0.0.1:8123
  Database: exchange_analytics
  Username: default
  Password: ""
  AccountID: exchange-demo
  Source: execution-rpc
  Timeout: 3s
  QueueSize: 2048
  FlushInterval: 1s