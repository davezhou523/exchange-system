Name: execution-rpc
ListenOn: 0.0.0.0:9082
Log:
  Level: info
  Mode: file
  File: execution.log

Kafka:
  Addrs:
    - 127.0.0.1:9092
    - 127.0.0.1:29092
    - 127.0.0.1:39092
  Group: execution-rpc-signal
  Topics:
    Signal: signal
    HarvestPathSignal: harvest_path_signal
    Order: order
    Kline: kline

Exchange:
  RouteStrategy: direct
  DefaultExchange: binance
  Binance:
    BaseURL: https://demo-fapi.binance.com
    Testnet: true
    APIKey: "EyYZXotRJaaXeycqfwLaDYBREyLTyNQK8lCuZKilieOg5gBgKGnpbdXBSMN7eMjJ"
    SecretKey: "69wfjz9tkqUykbwlla6HUYcCKuVtRKvOEYoCUC1BdA0dYChSOccJpI1xnUpId0UP"
    Proxy: "socks5://127.0.0.1:1080"


Risk:
  MaxPositionSize: 0.2
  MaxLeverage: 7.0
  MaxDailyLossPct: 0.07
  MaxOpenPositions: 3
  MaxPositionExposure: 2.0
  StopLossPercent: 0.02
  MinOrderNotional: 5.0

Idempotent:
  TTLSeconds: 600

SignalLogDir: data/signal
OrderLogDir: data/order

ClickHouse:
  Enabled: true
  Endpoint: http://127.0.0.1:8123
  Database: exchange_analytics
  Username: default
  Password: ""
  AccountID: exchange-demo
  Source: execution-rpc
  Timeout: 3s
  QueueSize: 2048
  FlushInterval: 1s

Postgres:
  Enabled: false
  DSN: "postgres://exchange:exchange@127.0.0.1:5432/exchange_core?sslmode=disable"
  AccountID: exchange-demo
  MaxOpenConns: 10
  MaxIdleConns: 5
  ConnMaxLifetime: 30m